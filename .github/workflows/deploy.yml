name: Deploy to Production Servers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'ansible/**'
      - '.github/**'
      - 'database_schemas/**'
      - 'README.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # IPs of the active production servers (Experto and Aspec)
        server: [72.251.5.148, 72.251.5.152]
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.server }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Starting deployment on $(hostname)..."
            cd /opt/gescall
            
            # Pull latest changes
            git fetch --all
            git reset --hard origin/main
            
            # Update Backend
            cd /opt/gescall/back
            npm install --production
            
            # Run migrations
            set -a; source .env; set +a
            for f in $(ls migrations/*.js 2>/dev/null | sort); do
              echo "Running $f"
              node "$f"
            done
            
            # Restart backend
            pm2 restart gescall-backend
            
            # Update Frontend
            cd /opt/gescall/front
            npm install
            npm run build
            
            echo "Deployment completed successfully on $(hostname)!"
