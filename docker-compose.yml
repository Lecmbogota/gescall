# ============================================================================
# GesCall Docker Compose
# Runs: PostgreSQL, Redis, Backend (Node.js), Frontend (Nginx), Piper TTS
# NOTE: Asterisk runs on the HOST (not containerized)
# ============================================================================
version: '3.8'

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: gescall-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gescall_db
      POSTGRES_USER: gescall_admin
      POSTGRES_PASSWORD: ${PG_PASSWORD:-gescall2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gescall_admin -d gescall_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: gescall-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Piper TTS (imagen propia: piper + voz + FastAPI; no montar ./docker/piper encima o se pierde el binario)
  piper-tts:
    build:
      context: ./docker/piper
      dockerfile: Dockerfile
    container_name: gescall-piper
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      TTS_MAX_CONCURRENT: ${TTS_MAX_CONCURRENT:-8}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 15s
      retries: 3

  # ── Backend (Node.js) ──
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: gescall-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./back/.env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      REDIS_URL: redis://redis:6379
      PIPER_TTS_URL: http://piper-tts:5000/tts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Network host for ARI (connects to Asterisk on host)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Frontend (Nginx) ──
  frontend:
    image: nginx:alpine
    container_name: gescall-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./front/dist:/usr/share/nginx/html:ro
      - ./docker/nginx/gescall.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

volumes:
  postgres_data:
