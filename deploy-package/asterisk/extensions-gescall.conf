; GesCall Custom Extensions
; CallerID Local Presence and Audio AGIs
; 
; This file should be included in extensions.conf with:
; #include extensions-gescall.conf
;
; Or call the AGI directly from campaigns using Vicidial's
; Dial Prefix or Custom Dial Logic

; CallerID Local Presence Context
; Use GoSub(gescall-callerid,s,1) before dialing
[gescall-callerid]
exten => s,1,NoOp(GesCall CallerID Local Presence)
exten => s,n,AGI(callerid_local_presence.agi)
exten => s,n,NoOp(CallerID Result: ${GESCALL_RESULT})
exten => s,n,Return()

; Macro version for older setups
[macro-gescall-callerid]
exten => s,1,NoOp(GesCall CallerID Macro)
exten => s,n,AGI(callerid_local_presence.agi)
exten => s,n,NoOp(CallerID Result: ${GESCALL_RESULT})

; Static Audio Playback Context (for IVR without TTS)
[gescall-static-audio]
exten => s,1,Answer()
exten => s,n,AGI(agi-static-audio.php,${ARG1})
exten => s,n,Hangup()

; Piper TTS IVR with DTMF Context
[gescall-piper-ivr]
exten => s,1,Answer()
exten => s,n,AGI(agi-piper-ivr-dtmf.php,${ARG1},${ARG2},${ARG3})
exten => s,n,Hangup()

; Playback Switch Context
[gescall-playback-switch]
exten => s,1,Answer()
exten => s,n,AGI(agi-playback-switch.php,${ARG1},${ARG2})
exten => s,n,Hangup()

; Note: To use CallerID Local Presence in outbound campaigns:
;
; Option 1: Custom Dial Prefix in Vicidial Campaign Settings
;   Set: GoSub(gescall-callerid,s,1)|
;   This calls the AGI before each outbound dial
;
; Option 2: Via extensions in loopback context  
;   Add before the Dial() in your outbound context:
;   exten => _X.,n,AGI(callerid_local_presence.agi)
