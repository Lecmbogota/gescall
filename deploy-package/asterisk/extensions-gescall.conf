; GesCall — dialplan mínimo (IVR y control vía ARI, app Stasis gescall-ivr)
;
; Saliente: el dialer Go hace originate con app=gescall-ivr y variables (leadid, …).
; Entrante: los endpoints PJSIP generados por el panel usan context=trunkinbound
; (ver back/routes/trunks.js). Este contexto debe existir y enviar el canal a Stasis.

[trunkinbound]
; EXTEN suele ser el DID marcado por el cliente; si el operador solo entrega "s",
; puede hacer falta ajustar (p. ej. usar CALLERID(dnid)) en una copia local.
exten => _.,1,NoOp(GesCall inbound → Stasis DID=${EXTEN})
 same => n,Stasis(gescall-ivr,inbound,${EXTEN})
 same => n,Hangup()
