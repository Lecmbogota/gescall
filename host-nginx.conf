server {
    listen 8081;
    server_name dev.chocktelecomsys.com;

    # ── Frontend React (Nativo) ──
    location / {
        root /var/www/gescall;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (Redirige a PM2) ──
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 500M;
    }

    # ── WebSockets (Socket.IO) ──
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── SIP sobre WebSocket (JsSIP en AgentWorkspace: wss://$host/ws) ──
    # /ws lo sirve el HTTP server de Asterisk (http.conf bindport, p. ej. 8078).
    # transport-ws en pjsip.conf NO abre socket propio; usa el del HTTP.
    location /ws {
        proxy_pass http://127.0.0.1:8078/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
