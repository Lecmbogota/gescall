---
# Role: postgresql — PostgreSQL installation and database setup

- name: Install PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-client
      - postgresql-contrib
    state: present
    update_cache: yes

- name: Ensure PostgreSQL is running
  ansible.builtin.systemd:
    name: postgresql
    state: started
    enabled: yes

- name: Create gescall database user
  become: yes
  become_user: postgres
  postgresql_user:
    name: "{{ pg_user }}"
    password: "{{ pg_password }}"
    role_attr_flags: CREATEDB,SUPERUSER
    state: present
  no_log: true

- name: Create gescall database
  become: yes
  become_user: postgres
  postgresql_db:
    name: "{{ pg_database }}"
    owner: "{{ pg_user }}"
    state: present

- name: Configure PostgreSQL listen addresses
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ ansible_local.postgresql_version | default('17') }}/main/postgresql.conf"
    regexp: "^#?listen_addresses"
    line: "listen_addresses = 'localhost'"
  notify: Restart PostgreSQL
  ignore_errors: yes

- name: Set PostgreSQL max connections
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/{{ ansible_local.postgresql_version | default('17') }}/main/postgresql.conf"
    regexp: "^#?max_connections"
    line: "max_connections = 500"
  ignore_errors: yes
