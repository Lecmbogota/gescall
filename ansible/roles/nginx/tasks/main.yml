---
# Role: nginx — Nginx reverse proxy with SSL via Let's Encrypt

- name: Install nginx and certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
    state: present

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Deploy GesCall nginx config (HTTP only first, for cert validation)
  ansible.builtin.template:
    src: gescall.conf.j2
    dest: /etc/nginx/sites-available/gescall
    mode: "0644"
  notify: Reload nginx

- name: Enable GesCall site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/gescall
    dest: /etc/nginx/sites-enabled/gescall
    state: link
  notify: Reload nginx

- name: Start nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes

- name: Flush handlers (ensure nginx is running for certbot)
  ansible.builtin.meta: flush_handlers

- name: Obtain SSL certificate via Let's Encrypt
  ansible.builtin.command:
    cmd: >-
      certbot certonly --nginx --non-interactive --agree-tos
      -d {{ subdomain }}
      --email admin@{{ subdomain | regex_replace('^[^.]+\.', '') }}
  register: certbot_result
  changed_when: "'Congratulations' in certbot_result.stdout"
  failed_when:
    - certbot_result.rc != 0
    - "'too many requests' not in certbot_result.stderr"
  ignore_errors: yes

- name: Deploy nginx config with SSL enabled
  ansible.builtin.template:
    src: gescall.conf.j2
    dest: /etc/nginx/sites-available/gescall
    mode: "0644"
  vars:
    ssl_enabled: "{{ certbot_result.rc == 0 }}"
  notify: Reload nginx

- name: Add certbot auto-renewal cron
  ansible.builtin.cron:
    name: "certbot renew"
    job: "certbot renew --quiet --post-hook 'systemctl reload nginx'"
    minute: "30"
    hour: "3"
    user: root
