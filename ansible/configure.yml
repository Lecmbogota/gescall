---
# Configure: desplegar GesCall en un LXC ya provisionado
# Uso: ansible-playbook -i inventory/clients.yml configure.yml --limit "cliente01"
#   o  ansible-playbook -i inventory/clients.yml configure.yml  (todos los clientes)

- name: Configure GesCall on LXC
  hosts: "{{ target_clients | default('all', true) }}"
  gather_facts: no
  vars:
    ansible_host: "{{ ovh_ip }}"
    ansible_user: root
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    gescall_install_dir: /opt/gescall
    gescall_repo_url: "{{ lookup('env', 'GESCALL_REPO') | default('https://github.com/Lecmbogota/gescall.git', true) }}"
    gescall_git_ref: "{{ gescall_version | default(lookup('env', 'GESCALL_VERSION') | default('main', true), true) }}"
    pg_database: gescall_db
    pg_user: gescall_admin
    pg_password: "{{ lookup('env', 'PG_PASSWORD') }}"
    redis_port: 6379
    ari_url: "http://127.0.0.1:8088"
    ari_user: gescall
    ari_pass: "{{ lookup('env', 'ARI_PASS') }}"
    backend_port: 3001
    frontend_build_dir: /var/www/gescall

  tasks:
    # Solo aplica cuando configure.yml se invoca vía semaphore-deploy.yml con deploy_action=provision.
    - name: Skip configuration when deploy_action is provision-only
      ansible.builtin.meta: end_play
      when: (deploy_action | default('', true) | trim) == 'provision'

    - name: Validate deploy secrets
      ansible.builtin.assert:
        that:
          - pg_password | length > 0
          - ari_pass | length > 0
        fail_msg: "PG_PASSWORD and ARI_PASS must be available in the environment."
      no_log: true

    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 60

    - name: Clone/update GesCall repo
      ansible.builtin.git:
        repo: "{{ gescall_repo_url }}"
        dest: "{{ gescall_install_dir }}"
        version: "{{ gescall_git_ref }}"
        force: yes
        update: yes

    - name: Create GesCall directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ gescall_install_dir }}"
        - "{{ gescall_install_dir }}/back/logs"
        - "{{ gescall_install_dir }}/dialer-go/logs"
        - "{{ frontend_build_dir }}"

    - name: Deploy .env from template
      ansible.builtin.template:
        src: roles/gescall/templates/env.j2
        dest: "{{ gescall_install_dir }}/back/.env"
        mode: "0600"
      no_log: true

    - name: Install backend npm dependencies
      community.general.npm:
        path: "{{ gescall_install_dir }}/back"
        ci: yes

    - name: Sync PostgreSQL password and fix table ownership
      ansible.builtin.shell: |
        su - postgres -c "psql -c \"ALTER USER {{ pg_user }} WITH PASSWORD '{{ pg_password }}';\""
        cat << 'EOF' > /tmp/fix_owner.sql
        DO $$ 
        DECLARE r RECORD; 
        BEGIN 
          FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public') LOOP 
            EXECUTE 'ALTER TABLE public.' || quote_ident(r.tablename) || ' OWNER TO {{ pg_user }}'; 
          END LOOP; 
        END $$;
        EOF
        su - postgres -c "psql -d {{ pg_database }} -f /tmp/fix_owner.sql"

    - name: Run PostgreSQL migrations
      ansible.builtin.shell: |
        set -a; source .env; set +a
        for f in $(ls migrations/*.js 2>/dev/null | sort); do
          echo "Running migration: $f"
          node "$f"
        done
      args:
        chdir: "{{ gescall_install_dir }}/back"
      register: migrations
      failed_when: false

    - name: Install frontend npm dependencies
      community.general.npm:
        path: "{{ gescall_install_dir }}/front"
        ci: yes
      environment:
        NPM_CONFIG_LEGACY_PEER_DEPS: "true"

    - name: Build frontend (Vite)
      ansible.builtin.shell: npm run build
      args:
        chdir: "{{ gescall_install_dir }}/front"
      environment:
        NODE_ENV: production

    - name: Build Go dialer
      ansible.builtin.shell: go build -o gescall-dialer .
      args:
        chdir: "{{ gescall_install_dir }}/dialer-go"

    - name: Start/reload PM2 processes
      ansible.builtin.shell: |
        pm2 startOrReload {{ gescall_install_dir }}/ecosystem.config.js --update-env
        pm2 save
      args:
        chdir: "{{ gescall_install_dir }}"

    - name: Configure PM2 auto-start
      ansible.builtin.shell: pm2 startup systemd -u root --hp /root
      ignore_errors: yes

    - name: Remove legacy wildcard Nginx configs
      ansible.builtin.shell: rm -f /etc/nginx/conf.d/*.conf
      ignore_errors: yes

    - name: Deploy Nginx configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/roles/gescall/templates/nginx.conf.j2"
        dest: "/etc/nginx/conf.d/{{ subdomain }}.conf"

    - name: Reload Nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded

    - name: Obtain SSL certificate via Certbot
      ansible.builtin.shell: >
        certbot --nginx -n --agree-tos -m admin@chocktelecomsys.com -d {{ subdomain }} --redirect
      ignore_errors: yes

    - name: Verify backend health
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ backend_port }}/health"
        return_content: yes
      register: health
      retries: 10
      delay: 2
      until: health.json.status == 'ok'

    - name: Deployment complete
      ansible.builtin.debug:
        msg: "GesCall {{ gescall_git_ref }} deployed on {{ subdomain }} ✓"
