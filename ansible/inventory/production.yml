---
# GesCall Production Inventory
# Each client is a host with its own config vars
all:
  vars:
    ansible_user: gescall-deploy
    ansible_python_interpreter: /usr/bin/python3
    # Defaults shared across all clients
    gescall_install_dir: /opt/gescall
    pg_database: gescall_db
    pg_user: gescall_admin
    redis_port: 6379
    ari_url: http://127.0.0.1:8088
    ari_user: gescall
    backend_port: 3001
    frontend_build_dir: /var/www/gescall

  children:
    production:
      hosts:
        # Copy this block for each client server
        cliente01:
          ansible_host: 192.168.1.101       # ← IP real del server
          subdomain: cliente01.empresa.com   # ← subdominio del cliente
          sip_trunk_endpoint: trunk_cliente01
          sip_trunk_host: sip.proveedor.com
          sip_trunk_port: 5060
          sip_trunk_prefix: "57"

        # cliente02:
        #   ansible_host: 192.168.1.102
        #   subdomain: cliente02.empresa.com
        #   sip_trunk_endpoint: trunk_cliente02
        #   sip_trunk_host: sip.proveedor.com
        #   sip_trunk_port: 5060
        #   sip_trunk_prefix: "57"
